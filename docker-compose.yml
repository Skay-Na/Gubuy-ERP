services:
  app:
    build: .
    container_name: gubuy-erp-app
    ports:
      - "8080:8080"
    environment:
      - DB_USER=root
      - DB_PASS=rootpassword
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=erp_db
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: gubuy-erp-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=erp_db
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
